name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check
      - name: Lint plugin sources
        run: |
          files=$(find chronocatalog-publisher.lrplugin -name '*.lua' 2>/dev/null || true)
          if [ -n "$files" ]; then luacheck $files; else echo "no Lua sources yet"; fi
